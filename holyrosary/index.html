<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy Rosary - ZEKSW</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0c10;
            --card-bg: #161822;
            --text-main: #ffffff;
            --accent-teal: #00f3ff;
            --accent-hover: #ff00ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Navigation --- */
        .nav-bar {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: flex-start;
        }

        .nav-bar a {
            color: var(--accent-teal);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .nav-bar a:hover {
            color: var(--accent-hover);
        }

        /* --- Main Content Layout --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        /* --- Image Styling --- */
        .image-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-wrapper:hover img {
            transform: scale(1.02); /* Subtle zoom effect on hover */
        }

        /* --- Interactive Link Cards --- */
        .links-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            width: 100%;
        }

        .action-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2rem 3rem;
            text-decoration: none;
            color: var(--text-main);
            text-align: center;
            min-width: 280px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* Invisible glow border that reveals on hover */
        .action-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px transparent;
            transition: box-shadow 0.3s ease;
            pointer-events: none;
        }

        .action-card:hover {
            transform: translateY(-5px);
            background-color: #1a1d29;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .action-card.privacy:hover::after {
            box-shadow: inset 0 0 0 2px var(--accent-teal);
        }

        .action-card.history:hover::after {
            box-shadow: inset 0 0 0 2px var(--accent-hover);
        }

        /* Typography inside cards */
        .link-privacy {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .link-history {
            font-family: 'Pacifico', cursive;
            font-size: 2.2rem;
            font-weight: 400;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .container { padding: 0 1.5rem 3rem; gap: 2rem; }
            .action-card { width: 100%; padding: 1.5rem; min-width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="/">← Back to Home</a>
    </nav>

    <main class="container">
        <div class="image-wrapper">
            <img src="../images/virgendeguadalupe1.png" alt="Stained Glass Window of Virgin Mary">
        </div>

        <div class="links-grid">
            <a href="/holyrosary/privacy" class="action-card privacy">
                <div class="link-privacy">Privacy Policy</div>
            </a>
            <a href="/holyrosary/history" class="action-card history">
                <div class="link-history">History</div>
            </a>
        </div>
    </main>

</body>
</html>
