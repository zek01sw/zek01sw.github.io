<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEKSW Home</title>
    <style>
        /* --- Base Setup --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4; /* Light gray background for the bottom section */
        }

        /* --- Hero Image Section (Top) --- */
        .hero-container {
            width: 100%;
            background-color: #0f111a; 
            display: flex;
            justify-content: center;
            padding: 2rem 1rem; /* Adds a little breathing room around the banner */
        }

        .hero-container img {
            width: 100%;
            max-width: 800px; /* Reduced from 1200px to keep it tighter */
            max-height: 35vh; /* Forces it to never take up more than 35% of your screen height */
            object-fit: contain; /* Ensures the whole logo stays visible without getting cropped or stretched */
            display: block;
        }

        /* --- Content Section (Bottom) --- */
        .content-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- Individual Image Links --- */
        .card {
            display: block;
            width: 320px;
            height: 320px;
            text-decoration: none;
            border-radius: 4px;
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #222; 
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .card {
                width: 100%;
                max-width: 350px;
                height: auto;
                aspect-ratio: 1 / 1;
            }
        }
    </style>
</head>
<body>

    <header class="hero-container">
        <img src="images/Gemini_Generated_Image_2y4d7q2y4d7q2y4d.jpg" alt="ZEKSW Neon Logo">
    </header>

    <main>
        <div class="content-grid">
            
            <a href="/mark1615" class="card">
                <img src="images/Mark16_15 Channel Logo V22.png" alt="Proclaim the Gospel">
            </a>

            <a href="/mylists" class="card">
                <img src="images/Gemini_Generated_Image_ekdxr0ekdxr0ekdx.jpg" alt="MLists Logo">
            </a>

            <a href="/holyrosary" class="card">
                <img src="images/virgendeguadalupe1.png" alt="Stained Glass Window">
            </a>

        </div>
    </main>

</body>
</html>
